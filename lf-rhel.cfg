# This kickstart file provides a minimal installation of RHEL 8+, Fedora 38+
# and compatible, with LVM partitioning. It consists of two parts:
# * The main part (this file), which is quite minimal,
# * and a dynamic part (/tmp/dynamic.ks) that gets written during the %pre
#   script. The %pre script parses options from the kernel cmdline, detects
#   the OS version, and generates /tmp/dynamic.ks based on these variables.
#
# Usage:
#   BIOS: press ESC on the first screen, then:
#     boot: linux inst.ks=https://linuxfabrik.ch/ks
#   UEFI: press 'e' on the "Install ..." entry and append to the linuxefi line:
#     inst.ks=https://linuxfabrik.ch/ks
#   then boot by pressing Ctrl-X.
#
# See the README for more details.


# System language
lang en_US.UTF-8

# Keyboard layouts
keyboard us

# System timezone
timezone Europe/Zurich --utc

# Shutdown after installation
shutdown

# Use text mode install and CDROM installation media
text
cdrom

# This command is required when performing an unattended installation on a system with previously
# initialized disks.
zerombr

# Automatically creates partitions required by your hardware platform, eg /boot/efi or biosboot
reqpart

# Network information
network --hostname=localhost.localdomain
# note: do not set any other network options. dhcp is the default anyway, and setting them here disregards the ip and nameserver settings on the kernel command line
# network --bootproto=dhcp --device=link --activate --onboot=on

# Do not configure the X Window System
skipx

# Disable the Setup Agent on first boot
firstboot --disable

# State of SELinux on the installed system
selinux --enforcing

# Firewalling should be done later on by the admin. Required for the cloud
firewall --disable

# System services
services --disabled="kdump" --enabled="NetworkManager,sshd"

# Disable kdump by default, frees up some memory
%addon com_redhat_kdump --disable
%end

%include /tmp/dynamic.ks



%pre --logfile /tmp/kickstart.install.pre.log --erroronfail
# Running kickstart version stamp (YYYYMMDDNN). Bump on every content change
# per CONTRIBUTING "Versioning". The value is echoed at install time (lands in
# /tmp/kickstart.install.pre.log and /var/log/anaconda/*) and re-echoed by the
# %post scripts; the Python helper picks it up from the environment and
# embeds it as a comment in the generated dynamic.ks so it is visible on the
# installed system via /root/dynamic.ks.
LF_KICKSTART_VERSION=2026041503
export LF_KICKSTART_VERSION
echo "Linuxfabrik Kickstart version: $LF_KICKSTART_VERSION"
# rhel8 only has platform-python, rhel9+ has python3, so we'll have to detect what we have
PYTHON=$(ls /usr/libexec/platform-python /usr/bin/python3 2> /dev/null | head -n1)
# Use a quoted heredoc delimiter ('EOT') so bash performs no variable or command
# substitution on the Python/shell code below. Without this, any "$var" or
# "$(cmd)" reference inside the embedded post-install shell code would be eaten
# by bash at pre-script-creation time, silently producing broken dynamic.ks
# output (this was the root cause of the long-standing "Could not find a
# grub.cfg in /boot" skip on all target versions). The shebang is cosmetic
# because line $PYTHON /tmp/pre-script.py below invokes the interpreter
# explicitly.
cat << 'EOT' > /tmp/pre-script.py
#!/usr/bin/env python3
import base64
import os
import re
import stat
import sys


def isblockdevice(path):
    return os.path.exists(path) and stat.S_ISBLK(os.stat(path).st_mode)


lfkeys = [
    'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOgFglbyAggW44TqCXG1h7tUDw8FPn7LM16j9tEebjR7 ali.bhatti@linuxfabrik.ch',
    'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFnYvkLotqpRKOWyT06IC73nqfvUWxtPTPvFZOnWmUVH danyal.berchtold@linuxfabrik.ch',
    'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOH3VQRfp3BRRk6H+rvASyKcI5tl2Jfj2BckkYQVYNNf eric.buerki@linuxfabrik.ch',
    'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAmEuZDD0x7CjgMdAvaTyWaNfSm1I/NHJrX2o8EGhzX/ jihan.el-karz@linuxfabrik.ch',
    'ssh-rsa   markus.frei@linuxfabrik.ch',
    'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIM5DxWzuUlSfdHHE1c4oQ2cbC0TyjXkVCuNKBJvn7TvX navid.sassan@linuxfabrik.ch',
]
lftype='minimal'
lfdisk = None
for guess in ['vda', 'sda', 'nvme0n1']:
    if isblockdevice('/dev/{}'.format(guess)):
        lfdisk = guess
        break

# Pick up the running kickstart version from the env var the outer %pre
# exported. Use 'unknown' as a defensive fallback so we never crash the
# install if the variable is missing for some reason.
lf_kickstart_version = os.environ.get('LF_KICKSTART_VERSION', 'unknown')
print('Linuxfabrik Kickstart version: {}'.format(lf_kickstart_version))

print('Linuxfabrik Kickstart: Set kernel cmdline arguments')
with open('/proc/cmdline', 'r') as file:
    cmdline = file.read()
    for item in cmdline.split(" "):
        if item.split("=")[0] == "lftype":
            lftype=item.split("=")[1].strip()
        elif item.split("=")[0] == "lfdisk":
            lfdisk=item.split("=")[1].strip()

if not lfdisk:
    print('Linuxfabrik Kickstart: Lfdisk is not given and no disk to install to could be guessed. Aborting...')
    sys.exit(1)

print('Linuxfabrik Kickstart: Lftype: {}, lfdisk: {}'.format(lftype, lfdisk))

print('Linuxfabrik Kickstart: Set bootloader')
# * console=ttyS0,115200n8:
#   required for cloud images.
#   see https://docs.openstack.org/image-guide/openstack-images.html#ensure-image-writes-boot-log-to-console
# * no_timer_check:
#   see https://opendev.org/openstack/diskimage-builder/commit/1ec93f43a8736171cb78382fd6184f03c001771b
# * net.ifnames=0:
#   for cloud images, 'eth0' _is_ the predictable device name
# * audit=1 audit_backlog_limit=8192:
#   required by CIS
# * vsyscall=none:
#   due to https://www.stigviewer.com/stig/red_hat_enterprise_linux_8/2020-11-25/finding/V-230278
bootloader_cis = 'bootloader --location=mbr --boot-drive={} --append="audit=1 audit_backlog_limit=8192 vsyscall=none"'.format(lfdisk)
bootloader_cloud = 'bootloader --location=mbr --boot-drive={} --append="console=tty0 console=ttyS0,115200n8 no_timer_check net.ifnames=0 vsyscall=none"'.format(lfdisk)
bootloader_cloud_cis = 'bootloader --location=mbr --boot-drive={} --append="console=tty0 console=ttyS0,115200n8 no_timer_check net.ifnames=0 audit=1 audit_backlog_limit=8192 vsyscall=none"'.format(lfdisk)
bootloader_minimal = 'bootloader --location=mbr --boot-drive={} --append="vsyscall=none"'.format(lfdisk)

print('Linuxfabrik Kickstart: Set packages')
packages = [
    '@core',
    '-plymouth', # No need for plymouth. Also means anaconda won't put rhgb/quiet on kernel command line
]
packages_cis = []
packages_cloud = [
    'cloud-init',
    'cloud-utils-growpart',
    'qemu-guest-agent',
    'rng-tools',
    'tuned',
    '-aic94xx-firmware',
    '-alsa-firmware',
    '-alsa-lib',
    '-alsa-tools-firmware',
    '-biosdevname',
    '-iprutils',
    '-ivtv-firmware',
    '-iwl100-firmware',
    '-iwl1000-firmware',
    '-iwl105-firmware',
    '-iwl135-firmware',
    '-iwl2000-firmware',
    '-iwl2030-firmware',
    '-iwl3160-firmware',
    '-iwl3945-firmware',
    '-iwl4965-firmware',
    '-iwl5000-firmware',
    '-iwl5150-firmware',
    '-iwl6000-firmware',
    '-iwl6000g2a-firmware',
    '-iwl6000g2b-firmware',
    '-iwl6050-firmware',
    '-iwl7260-firmware',
    '-langpacks-*',
    '-langpacks-en',
    '-libertas-sd8686-firmware',
    '-libertas-sd8787-firmware',
    '-libertas-usb8388-firmware',
]
packages_cloud_cis = packages_cloud
packages_minimal = []

print('Linuxfabrik Kickstart: Set partitioning schema')
part_cis = [
    'logvol /              --fstype="xfs"  --size=4096   --vgname=rl --name=root',
    'logvol /backup        --fstype="xfs"  --size=1024   --vgname=rl --name=backup        --fsoptions="nodev,noexec,nosuid"',
    'logvol /home          --fstype="xfs"  --size=1024   --vgname=rl --name=home          --fsoptions="nodev,nosuid"',
    'logvol /tmp           --fstype="xfs"  --size=1024   --vgname=rl --name=tmp           --fsoptions="nodev,noexec,nosuid"',
    'logvol /var           --fstype="xfs"  --size=4096   --vgname=rl --name=var           --fsoptions="nodev,nosuid"',
    'logvol /var/log       --fstype="xfs"  --size=2048   --vgname=rl --name=var_log       --fsoptions="nodev,noexec,nosuid"',
    'logvol /var/log/audit --fstype="xfs"  --size=512    --vgname=rl --name=var_log_audit --fsoptions="nodev,noexec,nosuid"',
    'logvol /var/tmp       --fstype="xfs"  --size=1024   --vgname=rl --name=var_tmp       --fsoptions="nodev,noexec,nosuid"',
    'logvol swap           --fstype="swap" --recommended --vgname=rl --name=swap',
]
part_cloud = [
    'logvol /              --fstype="xfs"  --size=1024   --vgname=rl --name=root --grow',
    'logvol /backup        --fstype="xfs"  --size=1024   --vgname=rl --name=backup        --fsoptions="nodev,noexec,nosuid"',
    'logvol swap           --fstype="swap" --recommended --vgname=rl --name=swap',
]
part_cloud_cis = part_cis
part_minimal = part_cloud

print('Linuxfabrik Kickstart: Define users')
users_cis = [
    {
        'name': 'linuxfabrik',
        'cmd': 'user --name=linuxfabrik --groups=wheel --password=password --plaintext',
        'keys': lfkeys,
    },
    {
        'name': 'root',
        'cmd': 'rootpw --lock',
        'keys': [],
    },
]
users_cloud = [
    {
        'name': 'linuxfabrik',
        'cmd': 'user --name=linuxfabrik --groups=wheel --lock',
        'keys': [],
    },
    {
        'name': 'root',
        'cmd': 'rootpw --lock',
        'keys': [],
    },
]
users_cloud_cis = users_cloud
users_minimal = users_cis

print('Linuxfabrik Kickstart: Create post scripts')
post_cis = '''
# allow password-less sudo
cat > /etc/sudoers.d/linuxfabrik << EOF
linuxfabrik ALL=(ALL) NOPASSWD: ALL
EOF
chmod 0440 /etc/sudoers.d/linuxfabrik
'''

post_cloud = '''
# setup systemd to boot to the right runlevel
echo "Setting default runlevel to multiuser text mode"
rm -f /etc/systemd/system/default.target
ln -s /lib/systemd/system/multi-user.target /etc/systemd/system/default.target

# this is installed by default but we don't need it in virt
# Commenting out the following for =1234504
# rpm works just fine for removing this, no idea why yum can't cope
echo "Removing linux-firmware package"
rpm --erase linux-firmware

# Remove firewalld; was supposed to be optional in F18+, but is pulled in
# in install/image building.
echo "Removing firewalld"
# FIXME! clean_requirements_on_remove is the default with yum, but may
# not work when package was installed by Anaconda instead of command line.
# Also -- check if this is still even needed with new anaconda -- disabled
# firewall should _not_ pull in this package.
# yum -C -y remove "firewalld*" --setopt="clean_requirements_on_remove=1"
yum --cacheonly -y erase "firewalld*"

echo "Removing avahi"
yum --cacheonly -y remove avahi\\*

echo "Installing cloud-init cloud-utils-growpart rng-tools tuned"
# these tools always fail to install in the %packages section, so try this here
yum -y install cloud-init cloud-utils-growpart rng-tools tuned

# Since the scriptlets from yum install are running in chroot, they can't do a daemon-reload
# ("Running in chroot, ignoring command 'daemon-reload'"), so a "systemctl enable --now" would
# fail. "systemctl enable" is enough here.
systemctl enable cloud-init
systemctl enable cloud-init-local
systemctl enable cloud-config
systemctl enable cloud-final
systemctl enable rngd

echo "Getty fixes"
# We don't need autospawned gettys on cloud/virtual instances: although we
# route console output to the serial console, we don't actually have the
# opportunity to log in there. Use a logind drop-in instead of editing
# /etc/systemd/logind.conf in place, because recent systemd versions
# (shipped with RHEL/Rocky 10 and Fedora 39+) moved the stock logind.conf
# to /usr/lib/systemd/ and no longer ship it under /etc/. Drop-ins in
# /etc/systemd/logind.conf.d/ work on all supported systemd versions.
mkdir -p /etc/systemd/logind.conf.d
cat > /etc/systemd/logind.conf.d/10-lf-no-auto-vts.conf << EOF
[Login]
NAutoVTs=0
EOF

echo "Network fixes"
# initscripts don't like this file to be missing.
# and https://bugzilla.redhat.com/show_bug.cgi?id=1204612
cat > /etc/sysconfig/network << EOF
NETWORKING=yes
NOZEROCONF=yes
DEVTIMEOUT=10
EOF

echo "Truncate /etc/resolv.conf"
# Anaconda is writing an /etc/resolv.conf from the install environment.
# The system should start out with an empty file, otherwise cloud-init
# will try to use this information and may error:
# https://bugs.launchpad.net/cloud-init/+bug/1670052
truncate --size=0 /etc/resolv.conf

echo "Disable predictable network interface names"
# For cloud images, 'eth0' _is_ the predictable device name, since
# we don't want to be tied to specific virtual (!) hardware
rm -f /etc/udev/rules.d/70*
ln -s /dev/null /etc/udev/rules.d/80-net-name-slot.rules

echo 'Set generic localhost names (/etc/hosts)'
cat > /etc/hosts << EOF
127.0.0.1   localhost localhost.localdomain localhost4 localhost4.localdomain4
::1         localhost localhost.localdomain localhost6 localhost6.localdomain6

EOF

# Because memory is scarce resource in most cloud/virt environments,
# and because this impedes forensics, we are differing from the Fedora
# default of having /tmp on tmpfs.
# However, there is no need to disable the mount, as we are already overwriting the options
# for /tmp above.
# Masking the mount now would lead to a missing /tmp.
# echo "Disabling tmpfs for /tmp."
# systemctl mask tmp.mount

echo 'Set tuned profile to virtual-guest'
echo 'virtual-guest' > /etc/tuned/active_profile

echo 'Make sure firstboot does not start'
echo 'RUN_FIRSTBOOT=NO' > /etc/sysconfig/firstboot

echo 'Adjust sudoers for the linuxfabrik user'
cat > /etc/sudoers.d/linuxfabrik << EOF
linuxfabrik ALL=(ALL) NOPASSWD: ALL
EOF
chmod 0440 /etc/sudoers.d/linuxfabrik
sed --in-place 's/name: cloud-user/name: linuxfabrik/g' /etc/cloud/cloud.cfg

echo 'Cleaning up old yum repodata'
yum clean all

echo 'Adjust console output in /etc/default/grub and regenerate grub config'
# If init script messages need to be seen on the serial console as well, it should be made
# the primary by swapping the order of the console parameters:
sed --in-place 's/console=ttyS0,115200n8 console=tty0/console=tty0 console=ttyS0,115200n8/' /etc/default/grub
# Locate grub.cfg by probing well-known locations directly. Prefer
# /boot/grub2/grub.cfg over the UEFI vendor path because on RHEL/Rocky 9+
# the file under /boot/efi/EFI/<vendor>/grub.cfg is a thin wrapper that
# `configfile`s /boot/grub2/grub.cfg; grub2-mkconfig refuses to overwrite
# that wrapper and tells us to target /boot/grub2/grub.cfg instead. On
# RHEL/Rocky 8 UEFI, /boot/grub2/grub.cfg is a symlink into the EFI
# partition, so writing through it still updates the right file. On BIOS
# installs /boot/grub2/grub.cfg is always the real file.
grub_config_file=
for candidate in /boot/grub2/grub.cfg /boot/efi/EFI/*/grub.cfg; do
    if [ -f "$candidate" ]; then
        grub_config_file="$candidate"
        break
    fi
done
if [ -z "$grub_config_file" ]; then
    echo 'Could not find a grub.cfg in /boot. Skipping grub2-mkconfig'
else
    grub2-mkconfig --output="$grub_config_file"
fi

echo "Removing random-seed so it's not the same in every image"
rm -f /var/lib/systemd/random-seed

echo 'Remove /etc/machine-id'
# https://git.resf.org/sig_core/kickstarts/src/branch/r8/Rocky-8-GenericCloud-LVM.ks
truncate --size=0 /etc/machine-id

echo 'Remove various other log / cache files'
# Note: /root/anaconda-ks.cfg and /root/original-ks.cfg are intentionally
# NOT removed here. Modern Anaconda writes both files via the boss module
# (_writeKS_via_boss and CopyLogsTask) AFTER all %post scripts have run,
# so any rm -f here would run before the files exist and be a no-op.
# See pyanaconda/modules/boss/installation.py in rhinstaller/anaconda.
rm -f /root/.wget-hsts
rm -f /root/install.log
rm -f /root/install.log.syslog
rm -rf /var/lib/yum/*
rm -rf /var/log/anaconda*
rm -rf /var/log/yum.log
rm -rf /var/tmp/*
find /var/log -type f -exec truncate --size=0 {} \\;
export HISTSIZE=0
cat /dev/null > ~/.bash_history
history -c

echo 'Fixing SELinux contexts'
touch /var/log/cron
touch /var/log/boot.log
mkdir -p /var/cache/yum
# Walk the target root with restorecon and exclude /boot/efi from the
# relabel: it is vfat, which has no xattr support, so SELinux contexts
# cannot be stored there and any attempt produces harmless but alarming
# "Could not set context for /boot/efi/EFI/...: Operation not supported"
# messages. We use restorecon(8) directly instead of fixfiles(8) because
# on RHEL/Rocky 10 fixfiles does not support an exclude flag
# (`illegal option -- e`), while restorecon has had `-e <path>` for
# years and produces equivalent coverage for a fresh install.
/usr/sbin/restorecon -RF -e /boot/efi / || true
'''

post_cloud_cis = post_cloud
post_minimal = post_cis


print('Linuxfabrik Kickstart: Act on cmdargs & discovery for {}'.format(lftype))
if lftype == 'cloud':
    bootloader = bootloader_cloud
    packages += packages_cloud
    part = part_cloud
    post = post_cloud
    users = users_cloud

elif lftype == 'cloud-cis':
    bootloader = bootloader_cloud_cis
    packages += packages_cloud_cis
    part = part_cloud_cis
    post = post_cloud_cis
    users = users_cloud_cis

elif lftype == 'cis':
    bootloader = bootloader_cis
    packages += packages_cis
    part = part_cis
    post = post_cis
    users = users_cis

elif lftype == 'minimal':
    bootloader = bootloader_minimal
    packages += packages_minimal
    part = part_minimal
    post = post_minimal
    users = users_minimal

else:
    print('Linuxfabrik Kickstart: Unknown lftype "{}". Aborting...'.format(lftype))
    sys.exit(1)

# version specifics
with open('/etc/redhat-release') as file:
    rhel_version = int(re.findall('[0-9]{1,2}', file.read())[0])

print('Linuxfabrik Kickstart: Detected OS version {}'.format(rhel_version))

print('Linuxfabrik Kickstart: Write dynamic.ks')
dynamic = []
keypost = []

dynamic.append('# Linuxfabrik Kickstart version: {}'.format(lf_kickstart_version))
dynamic.append('# System users')
for user in users:
    dynamic.append(user['cmd'])
    for key in user['keys']:
        if user['name'] == 'root':
            keypost.append('mkdir -p -m0700 /root/.ssh')
            keypost.append('echo "{}" >> /root/.ssh/authorized_keys'.format(key))
            keypost.append('chmod 600 /root/.ssh/authorized_keys')
            keypost.append('restorecon -F /root/.ssh/authorized_keys')
        else:
            keypost.append('mkdir -p -m0700 /home/{}/.ssh'.format(user['name']))
            keypost.append('echo "{}" >> "/home/{}/.ssh/authorized_keys"'.format(key, user['name']))
            keypost.append('chmod 600 "/home/{}/.ssh/authorized_keys"'.format(user['name']))
            keypost.append('chown -R {}: /home/{}/.ssh'.format(user['name'], user['name']))
            keypost.append('restorecon -F "/home/{}/.ssh/authorized_keys"'.format(user['name']))

# https://github.com/Linuxfabrik/kickstart/issues/8:
#   Warning: An ssh user with the name linuxfabrik has already been defined.
# We deliberately avoid Kickstart's `sshkey` directive in favor of adding keys in %post because
# `pykickstart` (used by `sshkey`) warns about multiple entries for the same user. Putting it in
# %post avoids those warnings and makes the intent clearer to future maintainers.

dynamic.append('# Only touch {}. This setting is also respected by zerombr (confirmed on RHEL8 and 9)'.format(lfdisk))
dynamic.append('ignoredisk --only-use={}'.format(lfdisk))

dynamic.append('# System bootloader configuration')
dynamic.append(bootloader)

dynamic.append('# Do not remove any partitions, but initializes a disk (or disks) by creating a default disk label')
dynamic.append('clearpart --all --drives={} --initlabel --disklabel gpt'.format(lfdisk))

dynamic.append('# Partitioning')
dynamic.append('volgroup rl --pesize=4096 pv.0')
dynamic.append('part pv.0 --fstype=lvmpv --ondisk={} --size=1 --grow'.format(lfdisk))
dynamic.append('part /boot --fstype=xfs --ondisk={} --size=1024'.format(lfdisk))
dynamic.extend(part)

dynamic.append('%packages')
dynamic.extend(packages)
dynamic.append('%end')

dynamic.append('%post --erroronfail')
dynamic.append('echo "Linuxfabrik Kickstart version: {}"'.format(lf_kickstart_version))
# Write /root/lf-install-version: a distro-independent fleet marker file
# that carries the build stamp for quick identification across hosts.
dynamic.append('echo "{}" > /root/lf-install-version'.format(lf_kickstart_version))
dynamic.append(post)
dynamic.append('%end\n')

# actually write to file
dynamic_ks_content = '\n'.join(dynamic)
with open('/tmp/dynamic.ks', 'w') as file:
    file.write(dynamic_ks_content)

# Archive the rendered dynamic kickstart into the installed system for auditing.
# We do this by writing a chrooted %post script that Anaconda picks up from
# /usr/share/anaconda/post-scripts/. The content is base64-encoded to avoid
# any quoting/heredoc conflicts with the embedded shell code. This replaces an
# earlier %post --nochroot approach that relied on /tmp surviving between
# script phases and on parsing /proc/mounts, both of which proved fragile
# across RHEL 8/9/10 Anaconda versions.
dynamic_ks_b64 = base64.b64encode(dynamic_ks_content.encode('utf-8')).decode('ascii')
with open('/usr/share/anaconda/post-scripts/50-lf-archive-ks.ks', 'w') as file:
    file.write('%post --erroronfail\n')
    file.write('base64 --decode > /root/dynamic.ks << "LF_DYNAMIC_KS_B64"\n')
    file.write(dynamic_ks_b64 + '\n')
    file.write('LF_DYNAMIC_KS_B64\n')
    file.write('chmod 0600 /root/dynamic.ks\n')
    file.write('%end\n')

if keypost:
    ssh_keys_ks_content = '%post\n' + '\n'.join(keypost) + '\n%end\n'
    with open('/usr/share/anaconda/post-scripts/70-install-ssh-keys.ks', 'a') as file:
        file.write(ssh_keys_ks_content)
    # Archive the rendered ssh-keys kickstart fragment alongside dynamic.ks.
    ssh_keys_ks_b64 = base64.b64encode(ssh_keys_ks_content.encode('utf-8')).decode('ascii')
    with open('/usr/share/anaconda/post-scripts/50-lf-archive-ks.ks', 'a') as file:
        file.write('%post --erroronfail\n')
        file.write('base64 --decode > /root/70-install-ssh-keys.ks << "LF_SSH_KEYS_KS_B64"\n')
        file.write(ssh_keys_ks_b64 + '\n')
        file.write('LF_SSH_KEYS_KS_B64\n')
        file.write('chmod 0600 /root/70-install-ssh-keys.ks\n')
        file.write('%end\n')
print('Linuxfabrik Kickstart: Wrote dynamic kickstart to /tmp/dynamic.ks')
EOT
$PYTHON /tmp/pre-script.py
%end
