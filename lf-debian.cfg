# License: The Unlicense, see LICENSE file.

# This preseed file is the Debian equivalent of lf-rhel.cfg.
# It provides a minimal Debian installation with LVM partitioning.
#
# Note: Preseed only works with the Debian Installer (d-i).
#       It does NOT work with Ubuntu 20.04+ (which uses autoinstall/subiquity).
#
# Usage:
#   Boot from a Debian netinst/DVD ISO, press ESC at the boot menu, then:
#     boot: auto url=http://<server>/<path>/lf-debian.cfg
#   Or press 'e' on the "Install" entry and append:
#     auto url=http://<server>/<path>/lf-debian.cfg


### Localization

d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us


### Network

# DHCP is the default. Do not set explicit network options to allow
# kernel cmdline settings to take effect.
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string localhost
d-i netcfg/get_domain string localdomain


### Mirror

d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string


### Clock and timezone

d-i clock-setup/utc boolean true
d-i time/zone string Europe/Zurich
d-i clock-setup/ntp boolean true


### Users

# Do not create a root account (locks root, similar to lf-rhel.cfg)
d-i passwd/root-login boolean false

# Create linuxfabrik user with password 'password' (change after first login)
# SHA-512 hash of 'password'
d-i passwd/user-fullname string Linuxfabrik
d-i passwd/username string linuxfabrik
d-i passwd/user-password-crypted password $6$jUQz3dmHOgqKZ8By$mDSQTJ.DQiHnCvT2WUekXi/z6/mf8/lGrP2pHY0hgopg6QW6XULPebzYAhDbJ0PQ18IGpCuhTNbOHp2ZVJOxs1


### Partitioning: LVM with /boot, /, /backup and swap

d-i partman-auto/method string lvm
d-i partman-auto/disk string /dev/vda /dev/sda /dev/nvme0n1
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-md/confirm boolean true

# Use GPT
d-i partman-partitioning/choose_label select gpt
d-i partman-partitioning/default_label string gpt
d-i partman-efi/non_efi_system boolean true

# Volume group name
d-i partman-auto-lvm/new_vg_name string rl
d-i partman-auto-lvm/guided_size string max

d-i partman-auto/choose_recipe select custom
d-i partman-auto/expert_recipe string                         \
    custom ::                                                  \
        512 512 512 fat32                                      \
            $iflabel{ gpt }                                    \
            $reusemethod{ }                                    \
            method{ efi } format{ }                            \
        .                                                      \
        1024 1024 1024 ext4                                    \
            $primary{ } $bootable{ }                           \
            method{ format } format{ }                         \
            use_filesystem{ } filesystem{ ext4 }               \
            mountpoint{ /boot }                                \
        .                                                      \
        1024 1024 -1 ext4                                      \
            method{ lvm }                                      \
            vg_name{ rl }                                      \
        .                                                      \
        1024 1024 1024 ext4                                    \
            $lvmok{ }                                          \
            lv_name{ backup }                                  \
            in_vg{ rl }                                        \
            method{ format } format{ }                         \
            use_filesystem{ } filesystem{ ext4 }               \
            mountpoint{ /backup }                              \
            options/nodev{ nodev }                              \
            options/noexec{ noexec }                            \
            options/nosuid{ nosuid }                            \
        .                                                      \
        2048 2048 2048 linux-swap                               \
            $lvmok{ }                                          \
            lv_name{ swap }                                    \
            in_vg{ rl }                                        \
            method{ swap } format{ }                           \
        .                                                      \
        4096 4096 -1 ext4                                      \
            $lvmok{ }                                          \
            lv_name{ root }                                    \
            in_vg{ rl }                                        \
            method{ format } format{ }                         \
            use_filesystem{ } filesystem{ ext4 }               \
            mountpoint{ / }                                    \
        .

d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true


### Packages

tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string sudo qemu-guest-agent
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false


### Boot loader

d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default


### Post-installation

d-i preseed/late_command string \
    echo 'linuxfabrik ALL=(ALL) NOPASSWD: ALL' > /target/etc/sudoers.d/linuxfabrik; \
    chmod 0440 /target/etc/sudoers.d/linuxfabrik; \
    mkdir -p -m0700 /target/home/linuxfabrik/.ssh; \
    echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFnYvkLotqpRKOWyT06IC73nqfvUWxtPTPvFZOnWmUVH danyal.berchtold@linuxfabrik.ch' >> /target/home/linuxfabrik/.ssh/authorized_keys; \
    echo 'ssh-rsa  markus.frei@linuxfabrik.ch' >> /target/home/linuxfabrik/.ssh/authorized_keys; \
    echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIM5DxWzuUlSfdHHE1c4oQ2cbC0TyjXkVCuNKBJvn7TvX navid.sassan@linuxfabrik.ch' >> /target/home/linuxfabrik/.ssh/authorized_keys; \
    chmod 600 /target/home/linuxfabrik/.ssh/authorized_keys; \
    in-target chown -R linuxfabrik:linuxfabrik /home/linuxfabrik/.ssh


### Shutdown after installation

d-i debian-installer/exit/poweroff boolean true
d-i finish-install/reboot_in_progress note
